<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – nTex Protect Assets Demo</title>
  <link rel="stylesheet" href="/assets/css/login.css" />
</head>

<body>
  <div class="bg"></div>

  <main class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="40" height="40">
        <path d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.35C17.25 21.15 21 16.25 21 11V5l-9-4Z" />
      </svg>
    </div>

    <h1>nTex Protect Assets Demo</h1>
    <p class="subtitle">Sign in to your account</p>

    <div id="error-banner" class="error-banner hidden">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
        <path fill-rule="evenodd"
          d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"
          clip-rule="evenodd" />
      </svg>
      <span id="error-text">Invalid credentials</span>
    </div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter username"
          value="admin" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password"
            placeholder="Enter password" value="admin" required />
          <button type="button" id="toggle-pw" aria-label="Toggle password visibility">
            <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18"
              height="18">
              <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
              <path fill-rule="evenodd"
                d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z"
                clip-rule="evenodd" />
            </svg>
            <svg id="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18"
              height="18" class="hidden">
              <path fill-rule="evenodd"
                d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l14.5 14.5a.75.75 0 1 0 1.06-1.06l-1.745-1.745a10.029 10.029 0 0 0 3.3-4.38 1.651 1.651 0 0 0 0-1.185A10.004 10.004 0 0 0 9.999 3a9.956 9.956 0 0 0-4.744 1.194L3.28 2.22ZM7.752 6.69l1.092 1.092a2.5 2.5 0 0 1 3.374 3.373l1.091 1.092a4 4 0 0 0-5.557-5.557Z"
                clip-rule="evenodd" />
              <path
                d="m10.748 13.93 2.523 2.523a10.003 10.003 0 0 1-8.337-5.94 1.65 1.65 0 0 1 0-1.185A10.003 10.003 0 0 1 3.28 5.757L5.21 7.687a4 4 0 0 0 5.537 6.243Z" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">
        <span id="btn-text">Sign In</span>
        <span id="btn-spinner" class="spinner hidden"></span>
      </button>
    </form>
  </main>

  <script src="/assets/js/login.js"></script>
</body>

</html>
